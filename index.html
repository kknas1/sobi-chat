<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소비자분쟁해결 기준에 따른 금액 시뮬레이션</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Consumer Dispute</p>
        <h1>소비자분쟁해결 기준에 따른 금액 시뮬레이션</h1>
        <div class="hero-links">
          <span class="hero-note">상황을 적으면 필요한 내용만 다시 물어봅니다</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel chat-panel">
          <div class="panel-header">
            <h2>상담</h2>
          </div>

          <div id="chat-log" class="chat-log" aria-live="polite"></div>

          <form id="chat-form" class="chat-form">
            <label class="sr-only" for="chat-input">상담 입력</label>
            <textarea
              id="chat-input"
              name="message"
              rows="3"
              placeholder="상황을 편하게 적어주세요. 제가 부족한 사실은 다시 물어볼게요."
            ></textarea>
            <div class="chat-actions">
              <button type="button" id="reset-button" class="secondary-button">초기화</button>
              <button type="submit" class="primary-button">보내기</button>
            </div>
          </form>
        </section>

        <aside class="side-stack">
          <section class="panel state-panel">
            <div class="panel-header">
              <h2>정리</h2>
            </div>

            <div class="state-grid">
              <div class="state-block">
                <div class="state-label">품목군</div>
                <div id="detected-category" class="state-value">아직 미확정</div>
              </div>
              <div class="state-block">
                <div class="state-label">분쟁유형</div>
                <div id="detected-rule" class="state-value">아직 미확정</div>
              </div>
              <div class="state-block">
                <div class="state-label">다음 질문</div>
                <div id="next-question" class="state-value subtle">대화를 시작하면 필요한 사실을 바로 묻습니다.</div>
              </div>
            </div>

            <div>
              <p class="section-label">추출한 값</p>
              <div id="value-pills" class="pill-wrap">
                <span class="empty-pill">아직 없음</span>
              </div>
            </div>
          </section>

          <section class="panel result-panel">
            <div class="panel-header">
              <h2>판단 결과</h2>
            </div>

            <div id="result-card" class="result-card empty">
              <p class="result-empty">상담이 진행되면 여기서 예상 환급·배상 기준을 보여드립니다.</p>
            </div>
          </section>

          <section id="debug-panel" class="panel debug-panel" hidden>
            <div class="panel-header">
              <h2>디버그</h2>
            </div>

            <div class="state-grid">
              <div class="state-block">
                <div class="state-label">호출 경로</div>
                <div id="debug-source" class="state-value">대기 중</div>
              </div>
              <div class="state-block">
                <div class="state-label">상태</div>
                <div id="debug-status" class="state-value">아직 호출 없음</div>
              </div>
            </div>

            <div>
              <p class="section-label">최근 응답</p>
              <pre id="debug-json" class="debug-json">대기 중</pre>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
